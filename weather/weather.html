<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Weather console</title>
</head>
<body>
<script>
const xhr = new XMLHttpRequest();
xhr.addEventListener("readystatechange", function () {
	if (this.readyState === this.DONE) {
		console.log(this.responseText);
	}
});
xhr.open("GET", "weather.php");
xhr.send();
</script>
</body>
</html>
